service:
  flush: 1

pipeline:
  inputs:
    - name: opentelemetry
      listen: 127.0.0.1
      port: 4318

  filters:
    # copy the service.name group attribute to a key called service_name in the record
    - name: lua
      match: '*'
      script: add_routing_key.lua
      call: add_routing_key

    # rewrite the tag so that we can route to different outputs based on the service_name
    - name: rewrite_tag
      match: 'v1_logs'
      rule: $service_name . $service_name false
      emitter_name: re_emitted

  outputs:
    # debug output
    # stdout includes metadata and group attributes
    - name: stdout
      match: '*'

    # debug output
    # file output does not include metadata and group attributes
    # you'll only find the timestamp and the log message in the output
    - name: file
      match: '*'

    # TODO: add a second output to a different destination
    - name: opentelemetry
      match: 'zap-input-test'
      host: ${LOGS_DCE_HOST}
      port: 443
      tls: on
      tls.verify: on
      logs_uri: /dataCollectionRules/${DCR_IMMUTABLE_ID}/streams/Microsoft-OTLP-Logs/otlp/v1/logs

      # Microsoft Entra OAuth 2.0 client-credentials auth.
      oauth2.enable: true
      oauth2.token_url: https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      oauth2.client_id: ${CLIENT_ID}
      oauth2.client_secret: ${CLIENT_SECRET}
      oauth2.scope: https://monitor.azure.com/.default
      oauth2.auth_method: post
