service:
  flush: 5

pipeline:
  inputs:
    - name: tail
      path: ./otlp-test.log
      parser: json-otlp
      read_from_head: true
      exit_on_eof: true

  filters:
    # Tail writes parsed fields into the record body, not chunk metadata,
    # and content_modifier can only write flat metadata keys. This Lua
    # filter sets metadata.otlp.{severity_text,trace_id,span_id} directly,
    # mirroring the dummy-input test exactly: out_opentelemetry reads them
    # via $otlp['...'] accessors AND skips the top-level `otlp` metadata
    # key when packing remaining metadata as attributes — so they don't
    # leak into the OTLP attributes list.
    - name: lua
      match: '*'
      script: add_otlp_metadata.lua
      call: add_otlp_metadata

  outputs:
    - name: opentelemetry
      match: '*'
      host: ${LOGS_DCE_HOST}
      port: 443
      tls: on
      tls.verify: on
      logs_uri: /dataCollectionRules/${DCR_IMMUTABLE_ID}/streams/Microsoft-OTLP-Logs/otlp/v1/logs

      # Body + plain attributes go in the record. With `logs_body_key_attributes: on`
      # the body key is removed from the record before remaining fields become OTLP
      # attributes, so `body` is NOT duplicated.
      logs_body_key: body
      logs_body_key_attributes: on

      # Microsoft Entra OAuth 2.0 client-credentials auth.
      # The plugin fetches and refreshes the bearer token automatically.
      oauth2.enable: true
      oauth2.token_url: https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      oauth2.client_id: ${CLIENT_ID}
      oauth2.client_secret: ${CLIENT_SECRET}
      oauth2.scope: https://monitor.azure.com/.default
      oauth2.auth_method: post

      # This may be the only way to add resource attributes to tail input records
      processors:
        logs:
          # The tail input emits flat records without an OTLP group. The
          # content_modifier processor with context: otel_resource_attributes
          # only mutates GROUP_START records, so we first wrap records in an
          # OTLP envelope (empty resource + scope) and then write the
          # resource attributes into it.
          - name: opentelemetry_envelope
          - name: content_modifier
            context: otel_resource_attributes
            action: upsert
            key: res-attr1
            value: value1
          - name: content_modifier
            context: otel_resource_attributes
            action: upsert
            key: res-attr2
            value: value2

parsers:
  - name: json-otlp
    format: json
