service:
  flush: 5

pipeline:
  inputs:
    - name: tail
      path: ./otlp-test.log
      parser: json-otlp
      read_from_head: true
      exit_on_eof: true
      # Tail writes parsed fields into the record body, not chunk metadata.
      # Use content_modifier to populate top-level metadata keys that
      # out_opentelemetry reads by default via its `logs_*_metadata_key`
      # record accessors ($SeverityText, $TraceId, $SpanId). This produces
      # the same OTLP log record fields as the dummy-input test.
      #
      # Caveat vs the dummy-input test: dummy puts these fields under
      # `metadata.otlp.*`, which out_opentelemetry explicitly skips when
      # packing remaining metadata as OTLP attributes. content_modifier
      # only writes flat keys, so SeverityText/TraceId/SpanId also end up
      # in the OTLP attributes list. Removing the duplicates would require
      # a Lua filter (or upstream support for nested metadata writes).
      processors:
        logs:
          - name: content_modifier
            context: metadata
            action: insert
            key: SeverityText
            value: Info
          - name: content_modifier
            context: metadata
            action: insert
            key: TraceId
            value: 5b8efff798038103d269b633813fc60c
          - name: content_modifier
            context: metadata
            action: insert
            key: SpanId
            value: eee19b7ec3c1b173

  outputs:
    - name: opentelemetry
      match: '*'
      host: ${LOGS_DCE_HOST}
      port: 443
      tls: on
      tls.verify: on
      logs_uri: /dataCollectionRules/${DCR_IMMUTABLE_ID}/streams/Microsoft-OTLP-Logs/otlp/v1/logs

      # Body + plain attributes go in the record. With `logs_body_key_attributes: on`
      # the body key is removed from the record before remaining fields become OTLP
      # attributes, so `body` is NOT duplicated.
      logs_body_key: body
      logs_body_key_attributes: on

      # Microsoft Entra OAuth 2.0 client-credentials auth.
      # The plugin fetches and refreshes the bearer token automatically.
      oauth2.enable: true
      oauth2.token_url: https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      oauth2.client_id: ${CLIENT_ID}
      oauth2.client_secret: ${CLIENT_SECRET}
      oauth2.scope: https://monitor.azure.com/.default
      oauth2.auth_method: post

parsers:
  - name: json-otlp
    format: json
