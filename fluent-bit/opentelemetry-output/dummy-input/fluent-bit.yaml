service:
  flush: 5

pipeline:
  inputs:
    - name: dummy
      dummy: '{"Body": "hello from dummy input via OTLP", "SeverityText": "Info", "TraceId": "5b8efff798038103d269b633813fc60c", "SpanId": "eee19b7ec3c1b173", "key1": "value1", "key2": "value2"}'

  outputs:
    - name: opentelemetry
      match: '*'
      host: ${LOGS_DCE_HOST}
      port: 443
      tls: on
      tls.verify: on
      logs_uri: /dataCollectionRules/${DCR_IMMUTABLE_ID}/streams/Microsoft-OTLP-Logs/otlp/v1/logs

      # Map record fields to OTLP LogRecord fields. Anything not mapped becomes
      # an OTLP attribute on the log record.
      logs_body_key: Body
      # SeverityText/TraceId/SpanId match the plugin defaults ($SeverityText/$TraceId/$SpanId), so no
      # explicit logs_severity_text_message_key/logs_trace_id_message_key/logs_span_id_message_key needed.

      # Microsoft Entra OAuth 2.0 client-credentials auth.
      # The plugin fetches and refreshes the bearer token automatically.
      oauth2.enable: true
      oauth2.token_url: https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      oauth2.client_id: ${CLIENT_ID}
      oauth2.client_secret: ${CLIENT_SECRET}
      oauth2.scope: https://monitor.azure.com/.default
      oauth2.auth_method: post
