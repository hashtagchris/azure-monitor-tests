service:
  flush: 5

pipeline:
  inputs:
    - name: dummy
      # Body + plain attributes go in the record. With `logs_body_key_attributes: on`
      # the body key is removed from the record before remaining fields become OTLP
      # attributes, so `body` is NOT duplicated.
      dummy: '{"body": "hello from dummy input via OTLP", "key1": "value1", "key2": "value2"}'
      # OTLP-specific fields go under the `otlp` metadata key. The plugin reads
      # $otlp['severity_text'], $otlp['trace_id'], $otlp['span_id'] from metadata
      # first, and explicitly skips the top-level `otlp` key when packing
      # remaining metadata as attributes — so these don't show up as attributes.
      metadata: '{"otlp": {"severity_text": "Info", "trace_id": "5b8efff798038103d269b633813fc60c", "span_id": "eee19b7ec3c1b173"}}'
      samples: 1

  outputs:
    - name: opentelemetry
      match: '*'
      host: ${LOGS_DCE_HOST}
      port: 443
      tls: on
      tls.verify: on
      logs_uri: /dataCollectionRules/${DCR_IMMUTABLE_ID}/streams/Microsoft-OTLP-Logs/otlp/v1/logs

      logs_body_key: body
      logs_body_key_attributes: on

      # Microsoft Entra OAuth 2.0 client-credentials auth.
      # The plugin fetches and refreshes the bearer token automatically.
      oauth2.enable: true
      oauth2.token_url: https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token
      oauth2.client_id: ${CLIENT_ID}
      oauth2.client_secret: ${CLIENT_SECRET}
      oauth2.scope: https://monitor.azure.com/.default
      oauth2.auth_method: post
